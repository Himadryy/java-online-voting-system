<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Voting Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Hide scrollbar for a native app feel */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    <!-- Decorative Background -->
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

    <!-- Auth Container -->
    <div id="authContainer" class="z-10 w-full max-w-md px-6 fade-in">
        <div class="glass rounded-3xl shadow-2xl overflow-hidden border border-white/50">
            <div class="p-8">
                <div class="text-center mb-8">
                    <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-blue-100 text-blue-600 mb-4">
                        <i class="fas fa-vote-yea text-2xl"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-gray-900">Voter Portal</h1>
                    <p class="text-gray-500 text-sm mt-2">Secure Online Voting System</p>
                </div>

                <!-- Login Form -->
                <div id="loginForm">
                    <div class="space-y-5">
                        <div class="relative">
                            <i class="fas fa-id-badge absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="loginId" placeholder="Voter ID" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none">
                        </div>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="loginPass" placeholder="Password" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none">
                        </div>
                        <button onclick="login()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-semibold py-3 rounded-xl shadow-lg transform transition hover:scale-[1.02] active:scale-[0.98]">
                            Sign In to Vote
                        </button>
                    </div>
                    <p class="text-center mt-6 text-sm text-gray-600">
                        First time voting? <button onclick="toggleAuth()" class="text-blue-600 font-semibold hover:underline">Register here</button>
                    </p>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="hidden">
                    <div class="space-y-4">
                        <div class="relative">
                            <i class="fas fa-id-badge absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="regId" placeholder="Student / Voter ID" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none">
                        </div>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="regName" placeholder="Full Name" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none">
                        </div>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="regPass" placeholder="Create Password" class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all outline-none">
                        </div>
                        <button onclick="register()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold py-3 rounded-xl shadow-lg transform transition hover:scale-[1.02] active:scale-[0.98]">
                            Create Account
                        </button>
                    </div>
                    <p class="text-center mt-6 text-sm text-gray-600">
                        Already registered? <button onclick="toggleAuth()" class="text-indigo-600 font-semibold hover:underline">Back to Login</button>
                    </p>
                </div>
            </div>
        </div>
        
        <div class="text-center mt-6">
            <a href="/admin.html" class="text-xs text-gray-400 hover:text-gray-600 transition">Administrator Access</a>
        </div>
    </div>

    <!-- Voter Dashboard -->
    <div id="voterDashboard" class="hidden z-10 w-full h-screen flex flex-col bg-gray-50">
        <!-- Header -->
        <header class="bg-white px-6 py-4 shadow-sm flex justify-between items-center sticky top-0 z-50">
            <div>
                <h1 class="text-xl font-bold text-gray-900 leading-tight">Election <span class="text-blue-600">2026</span></h1>
                <p class="text-xs text-gray-500" id="voterNameDisplay">Welcome, Voter</p>
            </div>
            <button onclick="logout()" class="w-10 h-10 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 flex items-center justify-center transition">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-6 pb-24 w-full max-w-3xl mx-auto">
            
            <!-- Status Card -->
            <div class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-6 text-white shadow-lg mb-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 opacity-10">
                    <i class="fas fa-vote-yea text-9xl -mr-4 -mt-4"></i>
                </div>
                <div class="relative z-10">
                    <div id="electionStatusIcon" class="inline-flex items-center px-3 py-1 rounded-full bg-white/20 text-sm font-semibold mb-4 backdrop-blur-sm">
                        <span class="w-2 h-2 rounded-full bg-green-400 mr-2 animate-pulse"></span> Open
                    </div>
                    <h2 class="text-2xl font-bold mb-1" id="voterStatusTitle">Cast Your Vote</h2>
                    <p class="text-blue-100 text-sm" id="voterStatusDesc">Select a candidate below to securely record your decision.</p>
                </div>
            </div>

            <h3 class="text-lg font-bold text-gray-800 mb-4 px-1">Candidates</h3>
            
            <!-- Candidates Grid -->
            <div id="candidatesGrid" class="space-y-4">
                <!-- Loaded via JS -->
            </div>

        </main>
    </div>

    <script>
        const API_BASE = '/api';
        let currentUser = null;
        let isElectionActive = false;
        let pollInterval = null;

        function toggleAuth() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }

        async function login() {
            const id = document.getElementById('loginId').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if (!id || !pass) return Swal.fire({icon: 'error', title: 'Oops...', text: 'ID and Password are required', confirmButtonColor: '#4f46e5'});

            try {
                const res = await fetch(`${API_BASE}/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, password: pass })
                });
                const data = await res.json();
                
                if (data.success) {
                    if (data.role === 'ADMIN') {
                        Swal.fire({
                            icon: 'warning',
                            title: 'Admin Detected',
                            text: 'Admin accounts cannot vote here. Redirecting to Control Center...',
                            confirmButtonColor: '#4f46e5',
                            timer: 2500
                        }).then(() => {
                            window.location.href = '/admin.html';
                        });
                        return;
                    }
                    
                    currentUser = data;
                    document.getElementById('authContainer').classList.add('hidden');
                    document.getElementById('voterDashboard').classList.remove('hidden');
                    document.getElementById('voterNameDisplay').innerText = `Welcome, ${currentUser.name}`;
                    pollData();
                    pollInterval = setInterval(pollData, 3000);
                } else {
                    Swal.fire({icon: 'error', title: 'Login Failed', text: data.message, confirmButtonColor: '#4f46e5'});
                }
            } catch (err) { Swal.fire('Error', 'Server communication failed.', 'error'); }
        }

        async function register() {
            const id = document.getElementById('regId').value.trim();
            const name = document.getElementById('regName').value.trim();
            const pass = document.getElementById('regPass').value.trim();
            if (!id || !name || !pass) return Swal.fire({icon: 'warning', text: 'All fields are required', confirmButtonColor: '#4f46e5'});

            try {
                const res = await fetch(`${API_BASE}/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, name, password: pass })
                });
                const data = await res.json();
                if (data.success) {
                    Swal.fire({icon: 'success', title: 'Registered!', text: 'You can now log in.', confirmButtonColor: '#4f46e5'});
                    toggleAuth();
                } else {
                    Swal.fire({icon: 'error', title: 'Registration Failed', text: data.message, confirmButtonColor: '#4f46e5'});
                }
            } catch (err) { Swal.fire('Error', 'Server communication failed.', 'error'); }
        }

        function logout() {
            currentUser = null;
            clearInterval(pollInterval);
            document.getElementById('authContainer').classList.remove('hidden');
            document.getElementById('voterDashboard').classList.add('hidden');
            document.getElementById('loginId').value = '';
            document.getElementById('loginPass').value = '';
        }

        async function pollData() {
            if (!currentUser) return;
            try {
                const [statusRes, userRes, candRes] = await Promise.all([
                    fetch(`${API_BASE}/election/status`),
                    fetch(`${API_BASE}/user/${currentUser.id}`),
                    fetch(`${API_BASE}/candidates`)
                ]);
                
                const statusData = await statusRes.json();
                const userData = await userRes.json();
                const candidates = await candRes.json();
                
                isElectionActive = statusData.active;
                updateUI(userData.hasVoted, candidates);
            } catch (err) { console.error('Polling error', err); }
        }

        function updateUI(hasVoted, candidates) {
            const statusIcon = document.getElementById('electionStatusIcon');
            const statusTitle = document.getElementById('voterStatusTitle');
            const statusDesc = document.getElementById('voterStatusDesc');
            
            if (!isElectionActive) {
                statusIcon.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-400 mr-2"></span> Paused`;
                statusIcon.className = "inline-flex items-center px-3 py-1 rounded-full bg-red-500/30 text-sm font-semibold mb-4 backdrop-blur-sm";
                statusTitle.innerText = "Election Paused";
                statusDesc.innerText = "Voting is currently disabled by the administrator.";
            } else if (hasVoted) {
                statusIcon.innerHTML = `<span class="w-2 h-2 rounded-full bg-white mr-2"></span> Completed`;
                statusIcon.className = "inline-flex items-center px-3 py-1 rounded-full bg-white/30 text-sm font-semibold mb-4 backdrop-blur-sm";
                statusTitle.innerText = "Thank You!";
                statusDesc.innerText = "Your vote has been securely recorded. You cannot vote again.";
            } else {
                statusIcon.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-400 mr-2 animate-pulse"></span> Open`;
                statusIcon.className = "inline-flex items-center px-3 py-1 rounded-full bg-white/20 text-sm font-semibold mb-4 backdrop-blur-sm";
                statusTitle.innerText = "Cast Your Vote";
                statusDesc.innerText = "Select a candidate below to securely record your decision.";
            }

            const grid = document.getElementById('candidatesGrid');
            grid.innerHTML = '';
            
            if (candidates.length === 0) {
                grid.innerHTML = `<div class="text-center p-8 bg-white rounded-2xl shadow-sm border border-gray-100 text-gray-500">No candidates available.</div>`;
                return;
            }

            candidates.forEach((c, index) => {
                const disabled = hasVoted || !isElectionActive;
                const colors = ['bg-blue-500', 'bg-purple-500', 'bg-pink-500', 'bg-indigo-500', 'bg-teal-500'];
                const color = colors[index % colors.length];

                grid.innerHTML += `
                    <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex items-center justify-between transition-transform transform ${disabled ? 'opacity-75 cursor-not-allowed' : 'hover:-translate-y-1 hover:shadow-md cursor-pointer'}" onclick="${disabled ? '' : `confirmVote('${c.id}', '${c.name.replace(/'/g, "\\'")}')`}">
                        <div class="flex items-center space-x-4">
                            <div class="w-12 h-12 rounded-full ${color} text-white flex items-center justify-center text-xl font-bold shadow-inner">
                                ${c.name.charAt(0).toUpperCase()}
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-900 text-lg">${c.name}</h4>
                                <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">${c.party}</p>
                            </div>
                        </div>
                        <div class="w-8 h-8 rounded-full border-2 ${disabled ? 'border-gray-200' : 'border-blue-200'} flex items-center justify-center flex-shrink-0">
                            ${disabled ? (hasVoted ? '<i class="fas fa-lock text-gray-300"></i>' : '<i class="fas fa-ban text-gray-300"></i>') : '<i class="fas fa-chevron-right text-blue-500"></i>'}
                        </div>
                    </div>
                `;
            });
        }

        function confirmVote(id, name) {
            Swal.fire({
                title: 'Confirm Selection',
                html: `Are you certain you want to vote for <b>${name}</b>?<br><br><span class="text-sm text-red-500">This action is final.</span>`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#4f46e5',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'Yes, Cast Vote',
                cancelButtonText: 'Cancel',
                reverseButtons: true,
                customClass: { popup: 'rounded-2xl' }
            }).then(async (result) => {
                if (result.isConfirmed) {
                    try {
                        const res = await fetch(`${API_BASE}/vote`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ voterId: currentUser.id, candidateId: id })
                        });
                        const data = await res.json();
                        if (data.success) {
                            Swal.fire({
                                icon: 'success',
                                title: 'Vote Recorded!',
                                text: 'Your vote has been securely encrypted and submitted.',
                                confirmButtonColor: '#4f46e5',
                                customClass: { popup: 'rounded-2xl' }
                            });
                            pollData();
                        } else {
                            Swal.fire({icon: 'error', title: 'Voting Failed', text: data.message, confirmButtonColor: '#4f46e5'});
                        }
                    } catch(err) {
                        Swal.fire('Error', 'Network connection lost.', 'error');
                    }
                }
            });
        }
    </script>
</body>
</html>
